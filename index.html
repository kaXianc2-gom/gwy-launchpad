<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="公考工具箱 — 8个一站式备考工具，离线可用，数据不上传，全部开源免费">
<meta name="theme-color" content="#e67e22">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛</text></svg>">
<title>公考工具箱 — GWY Toolkit</title>
<style>
:root {
  --bg: #f0f4f8; --card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #64748b; --radius: 20px; --radius-sm: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.05); --shadow-lg: 0 12px 36px rgba(0,0,0,0.08);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0b1120; --card: #1e293b; --border: #334155;
  --text: #f1f5f9; --muted: #94a3b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;transition:background var(--transition),color var(--transition)}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}

/* ── Hero ── */
.hero{text-align:center;padding:40px 20px 32px}
.hero-icon{font-size:64px;margin-bottom:12px}
.hero-title{font-size:32px;font-weight:900;letter-spacing:1px;margin-bottom:8px;background:linear-gradient(135deg,#e67e22,#7c3aed,#0891b2,#16a34a,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;color:var(--muted);max-width:560px;margin:0 auto;line-height:1.7}

/* ── Workflow ── */
.workflow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:32px;font-size:13px;color:var(--muted)}
.workflow-step{padding:4px 12px;background:var(--card);border:1px solid var(--border);border-radius:16px;font-weight:600;white-space:nowrap}
.workflow-arrow{font-size:18px;color:var(--muted)}
.workflow-step.active{background:#fef3c7;border-color:#f59e0b;color:#92400e}

/* ── Settings ── */
.settings-bar{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:28px;padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow)}
.settings-bar label{font-size:13px;font-weight:600;color:var(--muted)}
.settings-bar select,.settings-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.settings-bar input{width:120px}
.settings-bar select:focus,.settings-bar input:focus{outline:none;border-color:#e67e22}

/* ── Tool Grid ── */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:32px}
.tool-card{
  display:flex;flex-direction:column;padding:20px;background:var(--card);
  border:2px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);
  transition:all var(--transition);cursor:pointer;text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
}
.tool-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--accent,var(--border))}
.tool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent,#e2e8f0)}
.tool-card .tc-icon{font-size:36px;margin-bottom:10px}
.tool-card .tc-name{font-size:18px;font-weight:800;margin-bottom:4px}
.tool-card .tc-tagline{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;flex:1}
.tool-card .tc-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.tool-card .tc-version{background:var(--bg);padding:2px 8px;border-radius:8px;font-weight:600}
.tool-card .tc-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}
.tc-done{background:#d1fae5;color:#065f46}
.tc-new{background:#dbeafe;color:#1d4ed8}
.tc-soon{background:#f1f5f9;color:#64748b}

/* ── Footer ── */
.footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}

@media (max-width:600px){
  .hero-title{font-size:24px}
  .hero-icon{font-size:48px}
  .tool-grid{grid-template-columns:1fr}
  .settings-bar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div class="container">

<!-- Hero -->
<div class="hero">
  <div class="hero-icon">🏛</div>
  <div class="hero-title">公考工具箱</div>
  <div class="hero-sub">一站式公考备考工具集 · 8 个工具覆盖全流程<br>离线可用 · 数据不上传 · 全部开源免费</div>
</div>

<!-- Workflow -->
<div class="workflow">
  <span class="workflow-step">🧹 清洗</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">🛡 脱敏</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">📊 筛选</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">⚖ 对比</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">📋 追踪</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">📝 刷题</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">🎤 面试</span><span class="workflow-arrow">→</span>
  <span class="workflow-step">🔍 政策</span>
</div>

<!-- Global Settings -->
<div class="settings-bar">
  <label>🎓 我的专业：</label>
  <input type="text" id="setMajor" aria-label="我的专业" placeholder="如：政治学类" style="width:140px">
  <label>📚 学历：</label>
  <select id="setEdu" aria-label="学历">
    <option value="">不限</option><option>大专及以上</option><option>本科及以上</option><option>仅限本科</option><option>硕士及以上</option>
  </select>
  <label>📍 意向省份：</label>
  <input type="text" id="setProvince" aria-label="意向省份" placeholder="如：青海" style="width:80px">
  <button class="btn-save" id="btnSavePrefs" style="padding:6px 16px;background:#e67e22;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px">💾 保存偏好</button>
  <button id="themeToggle" style="padding:6px 12px;border:2px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:18px;transition:all var(--transition);margin-left:8px" aria-label="切换暗色/亮色主题" title="切换主题">🌙</button>
  <span style="font-size:11px;color:var(--muted)">（保存后所有工具自动读取）</span>
</div>

<!-- Tool Grid -->
<div class="tool-grid" id="toolGrid"></div>

<div class="footer">
  ⚡ 全部工具纯 HTML 单文件 · MIT 开源 · 数据本地处理不上传 &nbsp;|&nbsp; GWY Toolkit v1.0.0
</div>

</div>

<script>
"use strict";
// ═══════════════════════════════════════════════
//  TOOL METADATA
// ═══════════════════════════════════════════════
const TOOLS = [
  { id:'table-norm', name:'TableNorm', icon:'🧹', tagline:'表格列名标准化 — 统一各省职位表格式', color:'#16a34a', version:'v1.0.0', github:'kaXianc2-gom/table-norm', status:'done', order:1 },
  { id:'data-veil', name:'DataVeil', icon:'🛡️', tagline:'PII数据脱敏 — 身份证/手机号/银行卡/地址打码', color:'#3b82f6', version:'v1.2.0', github:'kaXianc2-gom/data-veil', status:'done', order:2 },
  { id:'sheet-lens', name:'SheetLens', icon:'📊', tagline:'智能岗位筛选 — 5维评分+中国地图热力图', color:'#e67e22', version:'v1.1.0', github:'kaXianc2-gom/sheet-lens', status:'done', order:3 },
  { id:'post-cmp', name:'PostCmp', icon:'⚖', tagline:'岗位深度对比 — 雷达图+多维评分+智能推荐', color:'#7c3aed', version:'v1.0.0', github:'kaXianc2-gom/post-cmp', status:'done', order:4 },
  { id:'app-track', name:'AppTrack', icon:'📋', tagline:'报名进度追踪 — 时间线+材料清单+截止提醒', color:'#0891b2', version:'v1.0.0', github:'kaXianc2-gom/app-track', status:'done', order:5 },
  { id:'exam-prep', name:'ExamPrep', icon:'📝', tagline:'行测刷题+面试模拟 — 90题题库+录音回放', color:'#dc2626', version:'v1.0.0', github:'kaXianc2-gom/exam-prep', status:'done', order:6 },
  { id:'policy-search', name:'PolicySearch', icon:'🔍', tagline:'政策文件搜索 — 同义词扩展+关键词高亮', color:'#8b5cf6', version:'v1.0.0', github:'kaXianc2-gom/policy-search', status:'done', order:7 },
  { id:'gwy-launchpad', name:'LaunchPad', icon:'🏛', tagline:'公考工具箱 — 统一启动器（本页面）', color:'#f59e0b', version:'v1.0.0', github:'kaXianc2-gom/gwy-launchpad', status:'done', order:8 }
];

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
const GITHUB_BASE = 'https://github.com/';

function renderTools() {
  let html = '';
  TOOLS.sort(function(a,b){ return a.order - b.order; }).forEach(function(tool) {
    let localFile = tool.id === 'gwy-launchpad' ? 'gwy-launchpad.html' : tool.id + '.html';
    if (tool.id === 'data-veil') localFile = 'DataVeil.html';
    if (tool.id === 'sheet-lens') localFile = 'SheetLens.html';
    let githubHref = GITHUB_BASE + tool.github;
    html += '<a class="tool-card" href="' + localFile + '" title="打开本地工具" style="--accent:' + tool.color + '">';
    html += '<div class="tc-icon">' + tool.icon + '</div>';
    html += '<div class="tc-name">' + tool.name + '</div>';
    html += '<div class="tc-tagline">' + tool.tagline + '</div>';
    html += '<div class="tc-meta">';
    html += '<span class="tc-version">' + tool.version + '</span>';
    html += '<span class="tc-status tc-done">✅ 已发布</span>';
    html += '<a class="tc-gh-link" href="' + githubHref + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="GitHub 仓库" style="font-size:11px;color:let(--muted);text-decoration:none;margin-left:auto">⭐</a>';
    html += '</div>';
    html += '</a>';
  });
  document.getElementById('toolGrid').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  GLOBAL PREFERENCES
// ═══════════════════════════════════════════════
function loadPrefs() {
  try {
    let d = localStorage.getItem('gwy_global_prefs');
    return d ? JSON.parse(d) : { major:'', edu:'', province:'' };
  } catch(e) { return { major:'', edu:'', province:'' }; }
}

function savePrefs() {
  let prefs = {
    major: document.getElementById('setMajor').value.trim(),
    edu: document.getElementById('setEdu').value,
    province: document.getElementById('setProvince').value.trim()
  };
  try { localStorage.setItem('gwy_global_prefs', JSON.stringify(prefs)); } catch(e) {}
  // Also save to SheetLens-compatible key
  try {
    let sl = { theme: document.documentElement.getAttribute('data-theme')||'light', filters: { major: prefs.major, edu: prefs.edu, province: prefs.province } };
    localStorage.setItem('sheetlens_settings', JSON.stringify(sl));
  } catch(e) {}
  showToast('✅ 偏好已保存，所有工具将自动读取');
}

function restorePrefs() {
  let p = loadPrefs();
  document.getElementById('setMajor').value = p.major || '';
  document.getElementById('setEdu').value = p.edu || '';
  document.getElementById('setProvince').value = p.province || '';
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  let el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;color:#fff;background:#16a34a;box-shadow:0 8px 24px rgba(0,0,0,0.2);animation:toastIn .3s ease';
  el.setAttribute('role','status');el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() {
    el.style.animation = 'toastOut .3s ease forwards';
    setTimeout(function() { if(el.parentNode)el.parentNode.removeChild(el); }, 300);
  }, 2000);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  // Theme
  try {
    let tm = localStorage.getItem('gwy_launchpad_theme');
    if (tm === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('themeToggle').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  } catch(e) {}
  // Theme toggle button (visible in settings bar)
  document.getElementById('themeToggle').addEventListener('click', function() {
    let cur = document.documentElement.getAttribute('data-theme');
    let next = cur === 'dark' ? '' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('themeToggle').textContent = next ? '☀️' : '🌙';
    try { localStorage.setItem('gwy_launchpad_theme', next || 'light'); } catch(e) {}
  });

  renderTools();
  restorePrefs();
  document.getElementById('btnSavePrefs').addEventListener('click', savePrefs);

  // Keyboard shortcut: Ctrl+S to save prefs
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); savePrefs(); }
  });
}

// Add toast animation styles
let toastStyle = document.createElement('style');
toastStyle.textContent = '@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(16px)}}';
document.head.appendChild(toastStyle);

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
</body>
</html>
