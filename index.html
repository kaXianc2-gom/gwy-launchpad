<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="公考工具箱">
<meta name="theme-color" content="#f0f0f5">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛</text></svg>">
<title>公考工具箱</title>
<style>
:root {
  --bg: #ececf1;
  --card-bg: rgba(255,255,255,0.78);
  --card-border: rgba(0,0,0,0.07);
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --fill: rgba(0,0,0,0.05);
  --separator: rgba(0,0,0,0.08);
  --radius: 18px;
  --spring: 0.4s cubic-bezier(0.22, 0.1, 0.2, 1);
  --spring-bounce: 0.5s cubic-bezier(0.22, 0.6, 0.25, 1.2);
}
[data-theme="dark"] {
  --bg: #161618;
  --card-bg: rgba(38,38,40,0.8);
  --card-border: rgba(255,255,255,0.07);
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #636366;
  --fill: rgba(255,255,255,0.08);
  --separator: rgba(255,255,255,0.1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background 0.4s ease;
  letter-spacing: -0.01em;
  overflow-x: hidden;
}

/* ── Background atmosphere ── */
.atmo{
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.atmo .orb{
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  animation: orbDrift 20s ease-in-out infinite;
}
.atmo .orb:nth-child(1){
  width: 55vw; height: 55vw;
  background: radial-gradient(circle, rgba(140,120,240,0.18), transparent);
  top: -15vh; left: -15vw;
  animation-delay: 0s;
}
.atmo .orb:nth-child(2){
  width: 45vw; height: 45vw;
  background: radial-gradient(circle, rgba(100,160,230,0.14), transparent);
  bottom: -10vh; right: -10vw;
  animation-delay: -7s;
}
.atmo .orb:nth-child(3){
  width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(240,160,100,0.12), transparent);
  top: 40vh; left: 40vw;
  animation-delay: -14s;
}
@keyframes orbDrift{
  0%,100%{ transform: translate(0,0) scale(1); }
  25%{ transform: translate(3vw,-2vh) scale(1.08); }
  50%{ transform: translate(-2vw,3vh) scale(0.94); }
  75%{ transform: translate(-3vw,-1vh) scale(1.05); }
}

/* ── Grid texture ── */
.grid-texture{
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.22;
  background-image:
    linear-gradient(var(--separator) 1px, transparent 1px),
    linear-gradient(90deg, var(--separator) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 70% 55% at 50% 40%, black 25%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 55% at 50% 40%, black 25%, transparent 70%);
}

/* ── Layout ── */
.app{
  display: flex;
  min-height: 100vh;
  position: relative; z-index: 1;
}

/* ── Left rail: workflow indicator ── */
.rail{
  width: 72px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 56px;
  position: sticky;
  top: 0;
  height: 100vh;
}
.rail-dots{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  position: relative;
}
.rail-dots::before{
  content: '';
  position: absolute;
  top: 12px; bottom: 12px; left: 50%;
  width: 1px;
  background: var(--separator);
  transform: translateX(-50%);
}
.rail-dot{
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-tertiary);
  transition: all var(--spring);
  position: relative; z-index: 1;
  cursor: pointer;
}
.rail-dot:hover{
  background: var(--text-secondary);
  box-shadow: 0 0 0 6px var(--fill);
}
.rail-label{
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
  opacity: 0;
  transition: opacity var(--spring);
  pointer-events: none;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.rail-dot:hover .rail-label{ opacity: 1; }

@media (max-width: 768px){
  .rail{ display: none; }
}

/* ── Main content ── */
.main{
  flex: 1;
  max-width: 960px;
  padding: 52px 32px 40px 8px;
}

.header{
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 44px;
}
.header h1{
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.025em;
  font-feature-settings: "kern" 1;
  background: linear-gradient(135deg, var(--text) 30%, var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.theme-btn{
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 0.5px solid var(--separator);
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  font-size: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--spring);
  color: var(--text-secondary);
}
.theme-btn:hover{ background: rgba(0,0,0,0.06); transform: scale(1.08); }

/* ── Settings ── */
.settings{
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 40px;
  padding: 14px 20px;
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid var(--card-border);
  border-radius: var(--radius);
  opacity: 0;
  animation: fadeSlideUp 0.55s var(--spring) 0.1s forwards;
}
.settings label{
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}
.settings select, .settings input{
  padding: 6px 10px;
  border: 0.5px solid var(--separator);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: rgba(0,0,0,0.03);
  color: var(--text);
  outline: none;
  transition: border-color var(--spring);
}
[data-theme="dark"] .settings select, [data-theme="dark"] .settings input{ background: rgba(255,255,255,0.04); }
.settings select:focus, .settings input:focus{ border-color: #0071e3; }
.settings input{ width: 108px; }
.settings .save-btn{
  padding: 6px 18px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  background: #0071e3;
  color: #fff;
  cursor: pointer;
  transition: all var(--spring);
}
.settings .save-btn:hover{ opacity: 0.85; transform: scale(1.03); }
.settings .hint{ font-size: 12px; color: var(--text-tertiary); }

/* ── Grid ── */
.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* ── Card with staggered entry ── */
.card{
  display: flex;
  flex-direction: column;
  padding: 22px 20px 20px;
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid var(--card-border);
  border-radius: var(--radius);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeSlideUp 0.5s var(--spring) forwards;
  transition: transform var(--spring), box-shadow var(--spring), border-color var(--spring);
}
.card:nth-child(1){ animation-delay: 0.15s; }
.card:nth-child(2){ animation-delay: 0.2s; }
.card:nth-child(3){ animation-delay: 0.25s; }
.card:nth-child(4){ animation-delay: 0.3s; }
.card:nth-child(5){ animation-delay: 0.35s; }
.card:nth-child(6){ animation-delay: 0.4s; }
.card:nth-child(7){ animation-delay: 0.45s; }

.card::after{
  content: '';
  position: absolute;
  left: 0; top: 14px; bottom: 14px;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--accent, #ccc);
  opacity: 0.5;
  transition: opacity var(--spring), width var(--spring);
}
.card:hover{
  transform: translateY(-4px) scale(1.015);
  box-shadow: 0 16px 48px rgba(0,0,0,0.1), 0 0 0 1px var(--accent, rgba(0,0,0,0.1));
  border-color: var(--accent, rgba(0,0,0,0.15));
  z-index: 2;
}
.card:hover::after{ opacity: 1; width: 4px; }
[data-theme="dark"] .card:hover{ box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px var(--accent, rgba(255,255,255,0.12)); }

.card .name{
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 5px;
  letter-spacing: -0.015em;
  padding-left: 4px;
  font-feature-settings: "kern" 1;
}
.card .desc{
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
  flex: 1;
  padding-left: 4px;
  letter-spacing: -0.005em;
}

/* ── Ripple overlay for click animation ── */
.ripple-overlay{
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none;
  background: radial-gradient(circle at var(--rx) var(--ry), var(--rc, rgba(255,255,255,0.95)) 0%, transparent 70%);
  opacity: 0;
  transition: none;
}
.ripple-overlay.go{
  animation: rippleOut 0.55s cubic-bezier(0.22, 0, 0.2, 1) forwards;
}
@keyframes rippleOut{
  0%{ opacity: 0; clip-path: circle(0% at var(--rx) var(--ry)); }
  30%{ opacity: 1; }
  100%{ opacity: 0; clip-path: circle(100% at var(--rx) var(--ry)); }
}

/* ── Page exit overlay (navigating away) ── */
.exit-overlay{
  position: fixed; inset: 0; z-index: 998;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.exit-overlay.active{ opacity: 1; pointer-events: all; }

/* ── Animations ── */
@keyframes fadeSlideUp{
  from{ opacity: 0; transform: translateY(20px); }
  to{ opacity: 1; transform: translateY(0); }
}

/* ── Toast ── */
.toast{
  position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%); z-index: 9999;
  padding: 10px 24px; border-radius: 20px;
  font-size: 14px; font-weight: 500;
  color: #fff;
  background: rgba(30,30,32,0.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  animation: toastIn 0.35s cubic-bezier(0.22,0.1,0.2,1);
}
.toast.out{ animation: toastOut 0.28s cubic-bezier(0.22,0.1,0.2,1) forwards; }

@keyframes toastIn{ from{ opacity:0; transform:translateX(-50%) translateY(14px); } to{ opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut{ from{ opacity:1; transform:translateX(-50%) translateY(0); } to{ opacity:0; transform:translateX(-50%) translateY(14px); } }

@media (max-width: 640px){
  .main{ padding: 36px 18px 28px; }
  .header h1{ font-size: 24px; }
  .settings{ flex-direction: column; align-items: stretch; }
  .settings input{ width: 100%; }
  .grid{ grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="atmo">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="grid-texture"></div>
<div class="ripple-overlay" id="ripple"></div>
<div class="exit-overlay" id="exitOverlay"></div>

<div class="app">

<div class="rail">
  <div class="rail-dots">
    <div class="rail-dot" data-tool="table-norm"><span class="rail-label">清洗</span></div>
    <div class="rail-dot" data-tool="data-veil"><span class="rail-label">脱敏</span></div>
    <div class="rail-dot" data-tool="sheet-lens"><span class="rail-label">筛选</span></div>
    <div class="rail-dot" data-tool="post-cmp"><span class="rail-label">对比</span></div>
    <div class="rail-dot" data-tool="app-track"><span class="rail-label">追踪</span></div>
    <div class="rail-dot" data-tool="exam-prep"><span class="rail-label">刷题</span></div>
    <div class="rail-dot" data-tool="policy-search"><span class="rail-label">政策</span></div>
  </div>
</div>

<div class="main">

<div class="header">
  <h1>公考工具箱</h1>
  <button class="theme-btn" id="themeToggle" aria-label="切换主题">🌙</button>
</div>

<div class="settings">
  <label>专业</label>
  <input type="text" id="setMajor" aria-label="专业" placeholder="政治学类">
  <label>学历</label>
  <select id="setEdu" aria-label="学历">
    <option value="">不限</option>
    <option>大专及以上</option>
    <option>本科及以上</option>
    <option>仅限本科</option>
    <option>硕士及以上</option>
  </select>
  <label>意向省份</label>
  <input type="text" id="setProvince" aria-label="意向省份" placeholder="青海">
  <button class="save-btn" id="btnSavePrefs">保存偏好</button>
  <span class="hint">所有工具自动读取</span>
</div>

<div class="grid" id="toolGrid"></div>

</div>
</div>

<script>
"use strict";

const TOOLS = [
  { id:'table-norm', file:'table-norm.html', name:'TableNorm', desc:'表格列名标准化，16 个标准字段，100+ 同义词自动匹配', accent:'#16a34a', order:1 },
  { id:'data-veil', file:'DataVeil.html', name:'DataVeil', desc:'PII 数据脱敏，身份证、手机号、银行卡、地址自动打码', accent:'#3b82f6', order:2 },
  { id:'sheet-lens', file:'SheetLens.html', name:'SheetLens', desc:'岗位筛选，5 维评分引擎，中国地图热力图', accent:'#e67e22', order:3 },
  { id:'post-cmp', file:'post-cmp.html', name:'PostCmp', desc:'岗位对比，雷达图加多维评分，智能推荐', accent:'#7c3aed', order:4 },
  { id:'app-track', file:'app-track.html', name:'AppTrack', desc:'报名追踪，时间线、材料清单、截止提醒', accent:'#0891b2', order:5 },
  { id:'exam-prep', file:'exam-prep.html', name:'ExamPrep', desc:'行测刷题，130 道题、录音回放、模拟面试', accent:'#dc2626', order:6 },
  { id:'policy-search', file:'policy-search.html', name:'PolicySearch', desc:'政策搜索，官网实时抓取，同义词扩展', accent:'#8b5cf6', order:7 }
];

function renderTools() {
  let html = '';
  TOOLS.sort((a,b) => a.order - b.order).forEach(t => {
    html += '<a class="card" href="' + t.file + '" style="--accent:' + t.accent + '" data-tool="' + t.id + '" data-accent="' + t.accent + '">';
    html += '<div class="name">' + t.name + '</div>';
    html += '<div class="desc">' + t.desc + '</div>';
    html += '</a>';
  });
  document.getElementById('toolGrid').innerHTML = html;
  bindCardClicks();
  bindRailDots();
}

/* ── Card click: ripple → exit overlay → navigate ── */
function bindCardClicks() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function(e) {
      e.preventDefault();
      let href = this.getAttribute('href');
      let accent = this.getAttribute('data-accent') || '#fff';
      let rect = this.getBoundingClientRect();
      let cx = e.clientX, cy = e.clientY;

      // Ripple from click point
      let ripple = document.getElementById('ripple');
      ripple.style.setProperty('--rx', cx + 'px');
      ripple.style.setProperty('--ry', cy + 'px');
      ripple.style.setProperty('--rc', accent);
      ripple.classList.remove('go');
      void ripple.offsetWidth;
      ripple.classList.add('go');

      // Exit overlay fades in
      setTimeout(() => {
        document.getElementById('exitOverlay').classList.add('active');
      }, 250);

      // Navigate
      setTimeout(() => {
        window.location.href = href;
      }, 400);
    });
  });
}

/* ── Rail dots: quick jump ── */
function bindRailDots() {
  document.querySelectorAll('.rail-dot').forEach(dot => {
    let toolId = dot.getAttribute('data-tool');
    let tool = TOOLS.find(t => t.id === toolId);
    if (!tool) return;
    dot.addEventListener('click', () => {
      let card = document.querySelector('.card[data-tool="' + toolId + '"]');
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.transform = 'scale(1.04)';
        setTimeout(() => { card.style.transform = ''; }, 400);
      } else {
        window.location.href = tool.file;
      }
    });
    dot.title = tool.name + ' — ' + tool.desc;
  });
}

/* ── Preferences ── */
function loadPrefs() {
  try {
    let d = localStorage.getItem('gwy_global_prefs');
    return d ? JSON.parse(d) : { major:'', edu:'', province:'' };
  } catch(e) { return { major:'', edu:'', province:'' }; }
}

function savePrefs() {
  let prefs = {
    major: document.getElementById('setMajor').value.trim(),
    edu: document.getElementById('setEdu').value,
    province: document.getElementById('setProvince').value.trim()
  };
  try { localStorage.setItem('gwy_global_prefs', JSON.stringify(prefs)); } catch(e) {}
  try {
    let sl = { theme: document.documentElement.getAttribute('data-theme')||'light', filters: { major: prefs.major, edu: prefs.edu, province: prefs.province } };
    localStorage.setItem('sheetlens_settings', JSON.stringify(sl));
  } catch(e) {}
  showToast('偏好已保存');
}

function restorePrefs() {
  let p = loadPrefs();
  document.getElementById('setMajor').value = p.major || '';
  document.getElementById('setEdu').value = p.edu || '';
  document.getElementById('setProvince').value = p.province || '';
}

function showToast(msg) {
  let el = document.createElement('div');
  el.className = 'toast';
  el.setAttribute('role','status');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 280);
  }, 2000);
}

function toggleTheme() {
  let cur = document.documentElement.getAttribute('data-theme');
  let next = cur === 'dark' ? '' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next ? '☀️' : '🌙';
  try { localStorage.setItem('gwy_launchpad_theme', next || 'light'); } catch(e) {}
}

function init() {
  try {
    let tm = localStorage.getItem('gwy_launchpad_theme');
    if (tm === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  } catch(e) {}

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  renderTools();
  restorePrefs();
  document.getElementById('btnSavePrefs').addEventListener('click', savePrefs);

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); savePrefs(); }
  });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
</body>
</html>
